<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#06C755">
  <title>アレグリア メンバー管理（店長）</title>
  <link rel="stylesheet" href="css/style.css?v=20260614-error-banner">
  <style>
    /* ===== 店長ツール専用スタイル（style.cssは変更しない） ===== */
    .day-nav {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 8px;
    }
    .day-nav-btn {
      flex: 0 0 56px; height: 48px; font-size: 20px; border-radius: 10px;
      border: 1px solid #d9d9d9; background: #fff; cursor: pointer;
    }
    .day-nav-btn:disabled { opacity: 0.3; }
    .day-nav-center { flex: 1; text-align: center; }
    .day-nav-date { font-size: 18px; font-weight: 700; }
    .day-nav-pos { font-size: 12px; color: #888; }
    .editor-toolbar { margin-bottom: 12px; }

    .staff-row {
      background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 8px;
    }
    .staff-row.on { border-color: #06C755; background: #f3fcf6; }
    .staff-row-top { display: flex; align-items: center; gap: 8px; }
    .staff-name { font-weight: 600; flex: 1; min-width: 0; font-size: 14px; }
    .hope { font-size: 12px; white-space: nowrap; }
    .hope.ok  { color: #0a8f43; }
    .hope.ng  { color: #999; }
    .hope.none { color: #c5c5c5; }
    .assign-toggle {
      flex: 0 0 64px; height: 36px; border-radius: 18px; font-size: 13px;
      border: 1px solid #d9d9d9; background: #f5f5f5; color: #888; cursor: pointer;
    }
    .assign-toggle.on { background: #06C755; border-color: #06C755; color: #fff; font-weight: 700; }
    .staff-row-times {
      display: flex; align-items: center; gap: 6px; margin-top: 8px;
    }
    .staff-row-times select {
      flex: 1; height: 40px; font-size: 15px; border-radius: 8px;
      border: 1px solid #ccc; background: #fff; padding: 0 8px;
    }
    .period-status-badge {
      display: inline-block; margin-left: 8px; padding: 2px 8px;
      border-radius: 10px; font-size: 11px; vertical-align: middle;
    }
    .period-status-badge.open { background: #e7f8ee; color: #0a8f43; }
    .period-status-badge.closed { background: #f0f0f0; color: #888; }
    .published-badge {
      display: none; margin: 0 0 8px; padding: 8px 12px; border-radius: 8px;
      background: #e7f1ff; color: #1a5fb4; font-size: 13px; text-align: center;
    }
    .published-badge.visible { display: block; }

    /* ===== メンバー管理画面 ===== */
    .store-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .store-tab {
      flex: 1; height: 44px; border-radius: 10px; font-size: 14px;
      border: 1px solid #d9d9d9; background: #fff; cursor: pointer;
    }
    .store-tab.on {
      background: #06C755; border-color: #06C755; color: #fff; font-weight: 700;
    }
    .member-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 12px;
    }
    .retired-toggle {
      display: flex; align-items: center; gap: 4px;
      font-size: 13px; color: #666; white-space: nowrap;
    }
    .member-add-form {
      background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
      padding: 12px; margin-bottom: 12px;
    }
    .member-add-form input {
      width: 100%; height: 44px; font-size: 15px; border: 1px solid #ccc;
      border-radius: 8px; padding: 0 10px; margin-bottom: 8px; box-sizing: border-box;
    }
    .member-add-actions { display: flex; gap: 8px; }
    .member-add-actions button { flex: 1; }
    .member-row {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid #e3e3e3; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 8px;
    }
    .member-row.retired { opacity: 0.55; }
    .member-row.sortable-ghost { opacity: 0.4; background: #eafaf0; }
    .member-drag-handle {
      flex: 0 0 28px; text-align: center; font-size: 18px; color: #bbb;
      cursor: grab; touch-action: none; /* タッチでのドラッグを優先 */
    }
    .member-name {
      flex: 1; min-width: 0; font-size: 14px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .role-badge {
      display: inline-block; margin-left: 6px; padding: 1px 6px;
      border-radius: 8px; font-size: 10px; background: #fff3df; color: #b97708;
      vertical-align: middle; border: none; cursor: pointer;
    }
    .role-badge.admin { background: #f0e7ff; color: #6b3fa0; }
    .link-badge {
      flex: 0 0 auto; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; white-space: nowrap;
    }
    .link-badge.linked   { background: #e7f8ee; color: #0a8f43; }
    .link-badge.unlinked { background: #f0f0f0; color: #888; }
    .member-action-btn {
      flex: 0 0 auto; height: 32px; padding: 0 12px; border-radius: 16px;
      font-size: 12px; border: 1px solid #e0b4b4; background: #fff;
      color: #c0392b; cursor: pointer;
    }
    .member-action-btn.rehire { border-color: #b4d4e0; color: #1a6fa8; }
    .member-section-label { font-size: 12px; color: #999; margin: 16px 0 6px; }

    /* ===== 雇用区分（セグメントトグル・バッジ・編集モーダル） ===== */
    .emp-seg-label { font-size: 12px; color: #666; margin: 0 0 6px; }
    .emp-seg {
      display: flex; border: 1px solid #d9d9d9; border-radius: 10px;
      overflow: hidden; margin-bottom: 8px;
    }
    .emp-seg-btn {
      flex: 1; height: 44px; font-size: 14px; border: none; background: #fff;
      color: #555; cursor: pointer; border-right: 1px solid #e3e3e3;
    }
    .emp-seg-btn:last-child { border-right: none; }
    .emp-seg-btn.on { background: #06C755; color: #fff; font-weight: 700; }

    .emp-badge {
      flex: 0 0 auto; padding: 2px 8px; border-radius: 10px; font-size: 11px;
      white-space: nowrap; border: none; cursor: pointer;
    }
    .emp-badge.pt  { background: #f0f0f0; color: #777; }
    .emp-badge.ft  { background: #e7f1ff; color: #1a5fb4; }
    .emp-badge.adm { background: #f0e7ff; color: #6b3fa0; }

    .emp-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      align-items: center; justify-content: center; z-index: 1000; padding: 24px;
      /* display は JS が none⇔flex で切り替える */
    }
    .emp-modal-box {
      background: #fff; border-radius: 14px; padding: 18px;
      width: 100%; max-width: 340px;
    }
    .emp-modal-title { font-size: 15px; font-weight: 700; margin: 0 0 4px; }
    .emp-modal-name { font-size: 14px; color: #666; margin: 0 0 12px; }
    .emp-modal-actions { display: flex; gap: 8px; }
    .emp-modal-actions button { flex: 1; }

    /* 手動シート更新FAB（右下固定）。メンバー管理表示中かつ店長のときだけ表示。 */
    .sheet-sync-fab {
      position: fixed;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom)); /* iPhoneのホームバー対応 */
      z-index: 1000;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      background: #06C755;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(0,0,0,.22);
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .sheet-sync-fab:active { transform: scale(.96); }
    .sheet-sync-fab[disabled] { opacity: .6; cursor: default; }
    .sheet-sync-fab .ssf-icon { font-size: 18px; line-height: 1; }
    .sheet-sync-fab.is-loading .ssf-icon { animation: ssf-spin 1s linear infinite; }
    .sheet-sync-fab.is-done { background: #06C755; }
    .sheet-sync-fab.is-error { background: #d9534f; }
    @keyframes ssf-spin { to { transform: rotate(360deg); } }

    .sheet-sync-meta {
      position: fixed;
      right: 18px;
      bottom: calc(64px + env(safe-area-inset-bottom));
      z-index: 1000;
      font-size: 11px;
      color: #888;
      background: rgba(255,255,255,.9);
      padding: 2px 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- 画面1: ローディング -->
  <section id="screen-loading" class="screen active">
    <p class="loading-logo">アレグリア</p>
    <p class="loading-sub">メンバー管理（店長用）</p>
    <div class="spinner" role="status" aria-label="読み込み中"></div>
  </section>

  <!-- 画面2: 期間選択（アレグリア運用では未使用・商品化用に温存。
       起動時は直接メンバー管理画面へ遷移する） -->
  <section id="screen-period-list" class="screen">
    <header class="screen-header">
      <h1>シフト作成</h1>
      <p class="screen-subtitle">こんにちは、<span id="admin-member-name"></span>さん。期間を選んでください</p>
    </header>
    <div class="screen-body">
      <div id="admin-period-list"></div>
      <button class="btn-secondary mt-16" onclick="MemberManager.open()">👥 メンバー管理</button>
      <button class="btn-secondary mt-12 js-back-home" onclick="goBackHome()">アプリのホームへ戻る</button>
    </div>
  </section>

  <!-- 画面2b: メンバー管理（期間に紐づかない・店舗単位）
       リストの中身は MemberManager（admin_v2.js）が描画する -->
  <section id="screen-member-list" class="screen">
    <header class="screen-header">
      <h1>メンバー管理</h1>
      <p class="screen-subtitle" id="member-store-label"></p>
    </header>
    <div class="screen-body">

      <!-- 店舗切り替え（権限のある店舗が複数のときだけJSが表示） -->
      <div id="member-store-tabs" class="store-tabs" style="display:none"></div>

      <div class="member-toolbar">
        <button class="btn-secondary btn-sm" onclick="MemberManager.showAddForm()">＋ メンバーを追加</button>
        <label class="retired-toggle">
          <input type="checkbox" id="member-show-retired"
            onchange="MemberManager.toggleRetired(this.checked)">
          退職者を表示
        </label>
      </div>

      <!-- 追加フォーム（通常は非表示） -->
      <div id="member-add-form" class="member-add-form" style="display:none">
        <input type="text" id="member-add-name" placeholder="名前（例: 山田　太郎）" maxlength="30">
        <p class="emp-seg-label">雇用区分</p>
        <div class="emp-seg" id="member-add-emp" role="group" aria-label="雇用区分">
          <button type="button" class="emp-seg-btn on" data-emp="part_time" onclick="MemberManager.selectAddEmp('part_time')">アルバイト</button>
          <button type="button" class="emp-seg-btn" data-emp="full_time" onclick="MemberManager.selectAddEmp('full_time')">社員</button>
        </div>
        <div class="member-add-actions">
          <button class="btn-secondary btn-sm" onclick="MemberManager.hideAddForm()">キャンセル</button>
          <button class="btn-primary btn-sm" onclick="MemberManager.submitAdd()">追加する</button>
        </div>
      </div>

      <!-- 在籍メンバー（ドラッグで並べ替え可能） -->
      <div id="member-list-active"></div>
      <!-- 退職者（トグルONのときだけ表示） -->
      <div id="member-list-retired" style="display:none"></div>

      <button class="btn-secondary mt-16 js-back-home" onclick="goBackHome()">アプリのホームへ戻る</button>
    </div>
  </section>

  <!-- 画面3: たたき台編集 -->
  <section id="screen-editor" class="screen">
    <header class="screen-header">
      <h1>シフト作成</h1>
      <p class="screen-subtitle" id="editor-period-label"></p>
    </header>
    <div class="screen-body">

      <div id="editor-published-badge" class="published-badge">
        ✅ この期間は公開済みです。変更したら「変更を公開する」を押してください
      </div>

      <div class="editor-toolbar">
        <button class="btn-secondary btn-sm" onclick="DraftEditor.copyFromHopes()">
          提出された希望をまとめて取り込む
        </button>
      </div>

      <div class="day-nav">
        <button class="day-nav-btn" id="editor-prev" onclick="DraftEditor.prevDay()">←</button>
        <div class="day-nav-center">
          <div id="editor-day-label" class="day-nav-date"></div>
          <div id="editor-day-pos" class="day-nav-pos"></div>
        </div>
        <button class="day-nav-btn" id="editor-next" onclick="DraftEditor.nextDay()">→</button>
      </div>

      <p id="editor-day-summary" class="manage-summary"></p>
      <div id="editor-day-body"></div>

      <div class="mt-16">
        <button class="btn-primary" id="editor-publish-btn" onclick="DraftEditor.publish()">
          確定して公開する ✓
        </button>
        <button class="btn-secondary mt-12" onclick="AdminPeriods.init()">期間一覧へ戻る</button>
      </div>

    </div>
  </section>

  <!-- エラー画面 -->
  <section id="screen-error" class="screen">
    <div class="error-icon">⚠️</div>
    <h2 class="error-title">エラーが発生しました</h2>
    <p id="error-message"></p>
    <button class="btn-primary" style="max-width:280px" onclick="location.reload()">再試行する</button>
    <button class="btn-secondary mt-12 js-back-home" style="max-width:280px" onclick="goBackHome()">
      アプリのホームへ戻る
    </button>
  </section>

  <!-- メンバー編集モーダル（行の雇用区分／役割バッジをタップで開く）。
       雇用区分は常に表示。役割セクションは権限・自分判定でJSが出し分ける。 -->
  <div id="member-edit-modal" class="emp-modal" style="display:none">
    <div class="emp-modal-box">
      <p class="emp-modal-title">メンバーを編集</p>
      <p class="emp-modal-name" id="member-edit-name"></p>

      <p class="emp-seg-label">雇用区分</p>
      <div class="emp-seg" id="member-edit-emp-seg" role="group" aria-label="雇用区分">
        <button type="button" class="emp-seg-btn" data-emp="part_time" onclick="MemberManager.pickEditEmp('part_time')">アルバイト</button>
        <button type="button" class="emp-seg-btn" data-emp="full_time" onclick="MemberManager.pickEditEmp('full_time')">社員</button>
      </div>

      <!-- 役割セクション（中身は MemberManager.editMember が権限に応じて描画。
           出せないときは wrap ごと非表示にする） -->
      <div id="member-edit-role-wrap" style="display:none">
        <p class="emp-seg-label">役割</p>
        <div id="member-edit-role-controls"></div>
      </div>

      <div class="emp-modal-actions">
        <button class="btn-secondary btn-sm" onclick="MemberManager.closeEditMember()">キャンセル</button>
        <button class="btn-primary btn-sm" onclick="MemberManager.saveEditMember()">保存</button>
      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- 手動シート更新FAB。メンバー管理表示中かつ店長のときだけ表示する -->
  <button id="sheet-sync-fab" class="sheet-sync-fab" style="display:none"
          onclick="MemberManager.manualSync()">
    <span class="ssf-icon">⟳</span>
    <span class="ssf-label">シフト表を更新</span>
  </button>
  <div id="sheet-sync-meta" class="sheet-sync-meta" style="display:none"></div>

  <!-- ===========================================================
       スクリプト読み込み順序:
         1. LIFF SDK / supabase-js / SortableJS（CDN）
            SortableJSはメンバー並べ替えのドラッグ＆ドロップ用（タッチ対応）
         2. config_v2.js ← CONFIG_V2
         3. api_v2.js    ← SupaAPI
         4. admin_v2.js  ← AdminState, AdminPeriods, MemberManager,
                           DraftEditor, initApp
  ============================================================ -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="js/config_v2.js?v=20260703-v6-gas-url"></script>
  <script src="js/api_v2.js?v=20260703-v14-sync-fab"></script>
  <script src="js/admin_v2.js?v=20260703-v3-sync-fab"></script>

</body>
</html>
